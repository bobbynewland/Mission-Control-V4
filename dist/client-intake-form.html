<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Intake Form - AI Skills Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #0f0f23;
      border-radius: 20px;
      padding: 40px;
      border: 1px solid rgba(255,215,0,0.2);
    }
    h1 {
      color: #ffd700;
      font-size: 28px;
      margin-bottom: 10px;
      text-align: center;
    }
    .subtitle {
      color: #888;
      text-align: center;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      color: #ccc;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
    }
    input, textarea, select {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #ffd700;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .success {
      display: none;
      text-align: center;
      padding: 40px;
    }
    .success h2 {
      color: #4ade80;
      margin-bottom: 10px;
    }
    @media (max-width: 600px) {
      .row { grid-template-columns: 1fr; }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎯 Client Intake</h1>
    <p class="subtitle">AI Skills Studio</p>
    
    <form id="intakeForm">
      <div class="row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="firstName" required placeholder="John">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="lastName" required placeholder="Doe">
        </div>
      </div>
      
      <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" required placeholder="john@company.com">
      </div>
      
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" name="phone" placeholder="+1 (555) 123-4567">
      </div>
      
      <div class="form-group">
        <label>Company / Business Name</label>
        <input type="text" name="company" placeholder="Acme Inc.">
      </div>
      
      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website" placeholder="https://...">
      </div>
      
      <div class="form-group">
        <label>What service are you interested in? *</label>
        <select name="service" required>
          <option value="">Select a service...</option>
          <option value="template-creation">Template Creation</option>
          <option value="content-marketing">Content & Marketing</option>
          <option value="social-media">Social Media Management</option>
          <option value="website">Website/ Landing Pages</option>
          <option value="automation">Business Automation</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>What's your monthly budget?</label>
        <select name="budget">
          <option value="">Select a range...</option>
          <option value="under-500">Under $500</option>
          <option value="500-1000">$500 - $1,000</option>
          <option value="1000-2500">$1,000 - $2,500</option>
          <option value="2500-5000">$2,500 - $5,000</option>
          <option value="5000+">$5,000+</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Tell us about your project *</label>
        <textarea name="project" required placeholder="Describe what you need help with..."></textarea>
      </div>
      
      <div class="form-group">
        <label>How did you hear about us?</label>
        <select name="referral">
          <option value="">Select...</option>
          <option value="instagram">Instagram</option>
          <option value="facebook">Facebook</option>
          <option value="referral">Referral</option>
          <option value="google">Google Search</option>
          <option value="other">Other</option>
        </select>
      </div>
      
      <button type="submit" class="btn">Submit Inquiry</button>
    </form>
    
    <div class="success" id="success">
      <h2>✅ Submitted!</h2>
      <p>Thanks for your interest. We'll be in touch within 24 hours.</p>
    </div>
  </div>
  
  <script>
    document.getElementById('intakeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const data = Object.fromEntries(new FormData(form));
      data.submittedAt = new Date().toISOString();
      
      // Store to localStorage (can sync to Firebase later)
      const submissions = JSON.parse(localStorage.getItem('client-intake') || '[]');
      submissions.push(data);
      localStorage.setItem('client-intake', JSON.stringify(submissions));
      
      form.style.display = 'none';
      document.getElementById('success').style.display = 'block';
    });
  </script>
</body>
</html>
